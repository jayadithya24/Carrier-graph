<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CareerGraph</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<header>
  <h1>CareerGraph</h1>

  <!-- ✅ ALL navigation buttons MUST be inside nav -->
  <nav>
    <button data-view="add">Add Student</button>
    <!-- <button data-view="link">Link Data</button> -->
    <button data-view="insights">Insights</button>
    <button data-view="recommend">Recommendations</button>
    <button data-view="import">Import CSV</button>
    <button id="btnGraph" data-view="graph">Graph View</button>

  </nav>
</header>

<main id="app" class="centered">
  <div id="graph-controls" style="margin-bottom: 1rem;">
    <button id="resetFilter">Reset Filter</button>
    <button id="cleanLayout">Clean Layout</button>
    <button id="clusterNode">Cluster Node</button>
    <button id="resetView">Reset View</button>
    <span style="margin-left:1rem">
      <span class="legend" style="background:#27ae60"></span>Student
      <span class="legend" style="background:#2980b9"></span>Skill
      <span class="legend" style="background:#e67e22"></span>Course
      <span class="legend" style="background:#c0392b"></span>Job
      <span class="legend" style="background:#8e44ad"></span>Company
    </span>
    <div style="margin-top:0.5rem">
      <select id="relationshipFilter">
        <option>All Relationships</option>
      </select>
      <select id="dataFilter">
        <option>All Graph Data</option>
      </select>
      <input id="searchBox" type="text" placeholder="Search by ID or name" />
      <button id="findNode">Find Node</button>
      <button id="clearSearch">Clear Search</button>
      <button id="refreshGraph">Refresh Graph</button>
    </div>
  </div>
  <div style="display:flex;gap:1rem;align-items:flex-start;">
    <div id="cy" style="width:70vw;height:60vh;border:1px solid #eee;background:#fff;border-radius:10px;"></div>
    <div id="node-details" style="flex:1;padding:1rem;background:#f8faff;border-radius:10px;min-height:60vh;">
      <h3>Node Details</h3>
      <div id="node-details-content">Click a node to inspect its connections.</div>
    </div>
  </div>
</main>

<footer>
  <p>Graph-based Academic and Career Intelligence System</p>
</footer>

<!-- ✅ D3 MUST load before app.js -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
